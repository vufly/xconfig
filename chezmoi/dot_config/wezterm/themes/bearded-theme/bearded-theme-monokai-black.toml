[metadata]
name = "Bearded Theme Monokai Black"
author = "BeardedBear"
origin_url = "https://github.com/BeardedBear/bearded-theme"

[colors]
foreground = "#c7c7c7"
background = "#111111"
cursor_bg = "#ffd866"
cursor_border = "#ffd866"
cursor_fg = "#141414"
selection_bg = "#333333"
selection_fg = "#c7c7c7"
scrollbar_thumb = "#282828"
split = "#050505"
ansi = ["#141414", "#fc6a67", "#a9dc76", "#ffd866", "#78dce8", "#e991e3", "#78e8c6", "#c7c7c7"]
brights = ["#444444", "#ff6764", "#a9f65c", "#ffd866", "#61eeff", "#fd7df4", "#61ffcf", "#fafafa"]

[colors.tab_bar]
background = "#0e0e0e"
inactive_tab_edge = "#0e0e0e"
inactive_tab_edge_hover = "#0e0e0e"

[colors.tab_bar.active_tab]
bg_color = "#141414"
fg_color = "#c7c7c7"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab]
bg_color = "#0e0e0e"
fg_color = "#545454"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab_hover]
bg_color = "#141414"
fg_color = "#c7c7c7"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab]
bg_color = "#0e0e0e"
fg_color = "#545454"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab_hover]
bg_color = "#141414"
fg_color = "#c7c7c7"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

