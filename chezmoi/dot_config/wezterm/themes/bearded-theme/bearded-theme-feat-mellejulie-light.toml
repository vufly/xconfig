[metadata]
name = "Bearded Theme Feat Mellejulie Light"
author = "BeardedBear"
origin_url = "https://github.com/BeardedBear/bearded-theme"

[colors]
foreground = "#000000"
background = "#e8e9e9"
cursor_bg = "#b48806"
cursor_border = "#b48806"
cursor_fg = "#edeeee"
selection_bg = "#b3cdcd"
selection_fg = "#000000"
scrollbar_thumb = "#c2c2c2"
split = "#c6c9c9"
ansi = ["#edeeee", "#d24545", "#2aa54d", "#b48806", "#1f89cf", "#ae6cbe", "#23716d", "#000000"]
brights = ["#b4b7b7", "#f52222", "#0bc440", "#ba8b00", "#008fee", "#c14cde", "#0d8781", "#333333"]

[colors.tab_bar]
background = "#e4e5e5"
inactive_tab_edge = "#e4e5e5"
inactive_tab_edge_hover = "#e4e5e5"

[colors.tab_bar.active_tab]
bg_color = "#edeeee"
fg_color = "#000000"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab]
bg_color = "#e4e5e5"
fg_color = "#577172"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab_hover]
bg_color = "#edeeee"
fg_color = "#000000"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab]
bg_color = "#e4e5e5"
fg_color = "#577172"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab_hover]
bg_color = "#edeeee"
fg_color = "#000000"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

