[metadata]
name = "Bearded Theme Black & Diamond"
author = "BeardedBear"
origin_url = "https://github.com/BeardedBear/bearded-theme"

[colors]
foreground = "#bec6d0"
background = "#0f1215"
cursor_bg = "#c7910c"
cursor_border = "#c7910c"
cursor_fg = "#111418"
selection_bg = "#1e3e47"
selection_fg = "#bec6d0"
scrollbar_thumb = "#26292c"
split = "#040506"
ansi = ["#111418", "#E35535", "#00a884", "#c7910c", "#11B7D4", "#d46ec0", "#38c7bd", "#bec6d0"]
brights = ["#3a4551", "#ff4319", "#00a884", "#d39600", "#00c3e5", "#f052d1", "#12edde", "#f9fafb"]

[colors.tab_bar]
background = "#0c0f11"
inactive_tab_edge = "#0c0f11"
inactive_tab_edge_hover = "#0c0f11"

[colors.tab_bar.active_tab]
bg_color = "#111418"
fg_color = "#bec6d0"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab]
bg_color = "#0c0f11"
fg_color = "#475262"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab_hover]
bg_color = "#111418"
fg_color = "#bec6d0"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab]
bg_color = "#0c0f11"
fg_color = "#475262"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab_hover]
bg_color = "#111418"
fg_color = "#bec6d0"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

