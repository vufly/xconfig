[metadata]
name = "Bearded Theme Black Amethyst Soft"
author = "BeardedBear"
origin_url = "https://github.com/BeardedBear/bearded-theme"

[colors]
foreground = "#cac9d8"
background = "#151422"
cursor_bg = "#c7910c"
cursor_border = "#c7910c"
cursor_fg = "#171626"
selection_bg = "#362650"
selection_fg = "#cac9d8"
scrollbar_thumb = "#251d38"
split = "#0b0b13"
ansi = ["#171626", "#E35535", "#00a884", "#c7910c", "#11B7D4", "#d46ec0", "#38c7bd", "#cac9d8"]
brights = ["#11B7D4", "#E35535", "#00a884", "#c7910c", "#11B7D4", "#d46ec0", "#38c7bd", "#cac9d8"]

[colors.tab_bar]
background = "#13121f"
inactive_tab_edge = "#13121f"
inactive_tab_edge_hover = "#13121f"

[colors.tab_bar.active_tab]
bg_color = "#171626"
fg_color = "#a85ff1"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab]
bg_color = "#13121f"
fg_color = "#918ec7"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab_hover]
bg_color = "#171626"
fg_color = "#a85ff1"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab]
bg_color = "#13121f"
fg_color = "#918ec7"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab_hover]
bg_color = "#171626"
fg_color = "#a85ff1"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

