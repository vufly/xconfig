[metadata]
name = "Bearded Theme Black Diamond Soft"
author = "BeardedBear"
origin_url = "https://github.com/BeardedBear/bearded-theme"

[colors]
foreground = "#c9d0d8"
background = "#141a22"
cursor_bg = "#c7910c"
cursor_border = "#c7910c"
cursor_fg = "#161d26"
selection_bg = "#1e3d49"
selection_fg = "#c9d0d8"
scrollbar_thumb = "#1a2b35"
split = "#0b0e13"
ansi = ["#161d26", "#E35535", "#00a884", "#c7910c", "#11B7D4", "#d46ec0", "#38c7bd", "#c9d0d8"]
brights = ["#11B7D4", "#E35535", "#00a884", "#c7910c", "#11B7D4", "#d46ec0", "#38c7bd", "#c9d0d8"]

[colors.tab_bar]
background = "#12181f"
inactive_tab_edge = "#12181f"
inactive_tab_edge_hover = "#12181f"

[colors.tab_bar.active_tab]
bg_color = "#161d26"
fg_color = "#11B7D4"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab]
bg_color = "#12181f"
fg_color = "#8ea7c7"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab_hover]
bg_color = "#161d26"
fg_color = "#11B7D4"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab]
bg_color = "#12181f"
fg_color = "#8ea7c7"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab_hover]
bg_color = "#161d26"
fg_color = "#11B7D4"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

