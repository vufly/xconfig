[metadata]
name = "Bearded Theme Hc Chocolate Espresso"
author = "BeardedBear"
origin_url = "https://github.com/BeardedBear/bearded-theme"

[colors]
foreground = "#d3b1b1"
background = "#2b2121"
cursor_bg = "#edbc7f"
cursor_border = "#edbc7f"
cursor_fg = "#2e2424"
selection_bg = "#624341"
selection_fg = "#d3b1b1"
scrollbar_thumb = "#413434"
split = "#1d1717"
ansi = ["#2e2424", "#fb7a6c", "#74be7d", "#edbc7f", "#4fc1e8", "#d995c9", "#17d7c4", "#d3b1b1"]
brights = ["#654d4d", "#ff7768", "#55dd66", "#ffbe6d", "#38ccff", "#ef7fd4", "#00eed6", "#f8f2f2"]

[colors.tab_bar]
background = "#281f1f"
inactive_tab_edge = "#281f1f"
inactive_tab_edge_hover = "#281f1f"

[colors.tab_bar.active_tab]
bg_color = "#3f2f2e"
fg_color = "#d3b1b1"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab]
bg_color = "#281f1f"
fg_color = "#5d4242"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab_hover]
bg_color = "#3f2f2e"
fg_color = "#d3b1b1"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab]
bg_color = "#281f1f"
fg_color = "#5d4242"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab_hover]
bg_color = "#3f2f2e"
fg_color = "#d3b1b1"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

