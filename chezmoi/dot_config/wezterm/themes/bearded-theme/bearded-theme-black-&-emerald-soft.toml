[metadata]
name = "Bearded Theme Black & Emerald Soft"
author = "BeardedBear"
origin_url = "https://github.com/BeardedBear/bearded-theme"

[colors]
foreground = "#c5d6dc"
background = "#141f22"
cursor_bg = "#c7910c"
cursor_border = "#c7910c"
cursor_fg = "#162226"
selection_bg = "#234c4c"
selection_fg = "#c5d6dc"
scrollbar_thumb = "#2a363a"
split = "#0b1113"
ansi = ["#162226", "#E35535", "#00a884", "#c7910c", "#11B7D4", "#d46ec0", "#38c7bd", "#c5d6dc"]
brights = ["#3a5a62", "#ff4319", "#00a884", "#d39600", "#00c3e5", "#f052d1", "#12edde", "#ffffff"]

[colors.tab_bar]
background = "#121c1f"
inactive_tab_edge = "#121c1f"
inactive_tab_edge_hover = "#121c1f"

[colors.tab_bar.active_tab]
bg_color = "#162226"
fg_color = "#c5d6dc"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab]
bg_color = "#121c1f"
fg_color = "#466a76"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab_hover]
bg_color = "#162226"
fg_color = "#c5d6dc"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab]
bg_color = "#121c1f"
fg_color = "#466a76"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab_hover]
bg_color = "#162226"
fg_color = "#c5d6dc"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

