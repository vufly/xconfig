[metadata]
name = "Bearded Theme Milkshake Mango"
author = "BeardedBear"
origin_url = "https://github.com/BeardedBear/bearded-theme"

[colors]
foreground = "#100a08"
background = "#f1e5dd"
cursor_bg = "#c08403"
cursor_border = "#c08403"
cursor_fg = "#f3eae3"
selection_bg = "#e7b8a3"
selection_fg = "#100a08"
scrollbar_thumb = "#cbc0b9"
split = "#dcc2ad"
ansi = ["#f3eae3", "#d12525", "#008b17", "#c08403", "#0076c5", "#c121a4", "#008f8f", "#100a08"]
brights = ["#d3ae95", "#f60000", "#008b17", "#c38500", "#0076c5", "#e200b9", "#008f8f", "#54352a"]

[colors.tab_bar]
background = "#eee1d7"
inactive_tab_edge = "#eee1d7"
inactive_tab_edge_hover = "#eee1d7"

[colors.tab_bar.active_tab]
bg_color = "#f0dacf"
fg_color = "#100a08"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab]
bg_color = "#eee1d7"
fg_color = "#93756a"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab_hover]
bg_color = "#f0dacf"
fg_color = "#100a08"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab]
bg_color = "#eee1d7"
fg_color = "#93756a"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab_hover]
bg_color = "#f0dacf"
fg_color = "#100a08"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

