[metadata]
name = "Bearded Theme Surprising Eggplant"
author = "BeardedBear"
origin_url = "https://github.com/BeardedBear/bearded-theme"

[colors]
foreground = "#d0c1de"
background = "#1a1222"
cursor_bg = "#d24e4e"
cursor_border = "#d24e4e"
cursor_fg = "#1d1426"
selection_bg = "#4e242f"
selection_fg = "#d0c1de"
scrollbar_thumb = "#31283a"
split = "#0e0912"
ansi = ["#1d1426", "#E35535", "#a9dc76", "#d24e4e", "#00B3BD", "#c47cbf", "#d24e4e", "#d0c1de"]
brights = ["#4d3565", "#ff4319", "#a9f65c", "#f32d2d", "#00b3bd", "#e15fd8", "#f32d2d", "#ffffff"]

[colors.tab_bar]
background = "#17101f"
inactive_tab_edge = "#17101f"
inactive_tab_edge_hover = "#17101f"

[colors.tab_bar.active_tab]
bg_color = "#1d1426"
fg_color = "#d0c1de"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab]
bg_color = "#17101f"
fg_color = "#5d4179"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab_hover]
bg_color = "#1d1426"
fg_color = "#d0c1de"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab]
bg_color = "#17101f"
fg_color = "#5d4179"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab_hover]
bg_color = "#1d1426"
fg_color = "#d0c1de"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

