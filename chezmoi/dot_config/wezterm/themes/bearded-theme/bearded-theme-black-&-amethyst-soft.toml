[metadata]
name = "Bearded Theme Black & Amethyst Soft"
author = "BeardedBear"
origin_url = "https://github.com/BeardedBear/bearded-theme"

[colors]
foreground = "#c6c5dc"
background = "#151422"
cursor_bg = "#c7910c"
cursor_border = "#c7910c"
cursor_fg = "#171626"
selection_bg = "#3d2a59"
selection_fg = "#c6c5dc"
scrollbar_thumb = "#2b2a3a"
split = "#0b0b13"
ansi = ["#171626", "#E35535", "#00a884", "#c7910c", "#11B7D4", "#d46ec0", "#38c7bd", "#c6c5dc"]
brights = ["#3d3a62", "#ff4319", "#00a884", "#d39600", "#00c3e5", "#f052d1", "#12edde", "#ffffff"]

[colors.tab_bar]
background = "#13121f"
inactive_tab_edge = "#13121f"
inactive_tab_edge_hover = "#13121f"

[colors.tab_bar.active_tab]
bg_color = "#171626"
fg_color = "#c6c5dc"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab]
bg_color = "#13121f"
fg_color = "#494676"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab_hover]
bg_color = "#171626"
fg_color = "#c6c5dc"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab]
bg_color = "#13121f"
fg_color = "#494676"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab_hover]
bg_color = "#171626"
fg_color = "#c6c5dc"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

