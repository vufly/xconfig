[metadata]
name = "Bearded Theme Coffee Reversed"
author = "BeardedBear"
origin_url = "https://github.com/BeardedBear/bearded-theme"

[colors]
foreground = "#c8aca5"
background = "#1d1919"
cursor_bg = "#f7d979"
cursor_border = "#f7d979"
cursor_fg = "#1a1716"
selection_bg = "#563a33"
selection_fg = "#c8aca5"
scrollbar_thumb = "#332c2b"
split = "#0f0d0d"
ansi = ["#1a1716", "#f24343", "#94D652", "#f7d979", "#6EDDD6", "#E480AD", "#3ceaa8", "#c8aca5"]
brights = ["#544848", "#ff3636", "#94f632", "#ffdd71", "#53f8ed", "#fb69ab", "#27ffad", "#efe6e4"]

[colors.tab_bar]
background = "#201c1b"
inactive_tab_edge = "#201c1b"
inactive_tab_edge_hover = "#201c1b"

[colors.tab_bar.active_tab]
bg_color = "#1a1716"
fg_color = "#c8aca5"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab]
bg_color = "#201c1b"
fg_color = "#4d3e3b"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.inactive_tab_hover]
bg_color = "#1a1716"
fg_color = "#c8aca5"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab]
bg_color = "#201c1b"
fg_color = "#4d3e3b"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

[colors.tab_bar.new_tab_hover]
bg_color = "#1a1716"
fg_color = "#c8aca5"
intensity = "Normal"
italic = false
strikethrough = false
underline = "None"

