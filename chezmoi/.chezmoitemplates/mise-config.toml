[tool_alias]
9router = "npm:9router"
agent-browser = "npm:agent-browser"
claude-code = "npm:@anthropic-ai/claude-code"
cliproxy = "github:router-for-me/CLIProxyAPI"
codex = "aqua:openai/codex"
codex-acp = "github:zed-industries/codex-acp"
codex-wakatime = "npm:codex-wakatime"
eza = "aqua:eza-community/eza"
graphify = "pipx:graphifyy"
nu-gstat = "cargo:nu_plugin_gstat"
oh-my-codex = "npm:oh-my-codex"
pm2 = "npm:pm2"
pnpm = "github:pnpm/pnpm"
psmux = "github:psmux/psmux"
rtk = "github:rtk-ai/rtk"
serie = "cargo:serie"
syncthing = "github:syncthing/syncthing"
tig = "github:jonas/tig"
tmux = "aqua:tmux/tmux-builds"
wakatime = "github:wakatime/wakatime-cli"
zellij = "github:zellij-org/zellij"

[settings]
minimum_release_age = "0h" # default is 24h
[settings.npm]
package_manager = "pnpm"
[settings.cargo]
binstall = true

[tools]
# JavaScript / TypeScript ecosystem
bun = "latest"
node = "lts"
pm2 = "latest"
pnpm = "latest"

# Language runtimes and toolchains
go = "latest"
python = "3.13"
rust = "latest"
uv = "latest"
cargo-binstall = "latest"

# Vibe coding
{{ if eq .machine "ohp360-wsl" -}}
agent-browser = { version = "latest", allowBuilds = "agent-browser" }
{{ end -}}
codex = "latest"
codex-acp = "latest"
claude-code = { version = "latest", allowBuilds = "@anthropic-ai/claude-code" }
cliproxy = "latest"
graphify = { version = "latest", postinstall = "graphify install && graphify install --platform opencode && graphify install --platform codex" }
opencode = "latest"
rtk = { version = "latest", postinstall = "rtk init -g && rtk init -g --codex && rtk init -g --opencode" }

# Shell and core terminal utilities
bat = "latest"
carapace = "latest"
eza = "latest"
fastfetch = "latest"
fd = "latest"
fzf = "latest"
glow = "latest"
jq = "latest"
nu-gstat = "latest"
oh-my-posh = "latest"
ripgrep = "latest"
scooter = "latest"
vivid = "latest"
yazi = "latest"
zoxide = "latest"

# Editors and terminal multiplexers
helix = "latest"
neovim = "latest"
zellij = "latest"

# Source control helpers
delta = "latest"
gh = "latest"
glab = "latest"
lazygit = "latest"
tig = { version = "latest", version_prefix = "tig-" }

# Security and secrets
bitwarden = "latest"

# Productivity and monitoring
wakatime = { version = "latest", bin = "wakatime-cli" }
codex-wakatime = "latest"

{{ if eq .chezmoi.os "windows" -}}
psmux = "latest"
syncthing = "latest"
yt-dlp = "latest"
{{ else -}}
# cliproxy = "latest"
serie = "latest"
tmux = "latest"
{{ end }}
