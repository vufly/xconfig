[tool_alias]
9router = "npm:9router"
claude-code = "npm:@anthropic-ai/claude-code"
cliproxy = "github:router-for-me/CLIProxyAPI"
codex-wakatime = "npm:codex-wakatime"
eza = "aqua:eza-community/eza"
graphifyy = "pipx:graphifyy"
oh-my-codex = "npm:oh-my-codex"
pm2 = "npm:pm2"
pnpm = "github:pnpm/pnpm"
psmux = "github:psmux/psmux"
rtk = "github:rtk-ai/rtk"
syncthing = "github:syncthing/syncthing"
tig = "github:jonas/tig"
tmux = "aqua:tmux/tmux-builds"
wakatime = "github:wakatime/wakatime-cli"
zellij = "github:zellij-org/zellij"

[settings]
[settings.npm]
package_manager = "pnpm"

[tools]
# JavaScript / TypeScript ecosystem
bun = "latest"
node = "lts"
pm2 = "latest"
pnpm = "latest"

# Language runtimes and toolchains
go = "latest"
python = "3.13"
rust = "latest"
uv = "latest"

# Vibe coding
codex = "latest"
claude-code = { version = "latest", allowBuilds = "@anthropic-ai/claude-code" }
graphifyy = "latest"
oh-my-codex = "latest"
opencode = "latest"
rtk = "latest"

# Shell and core terminal utilities
bat = "latest"
eza = "latest"
fastfetch = "latest"
fd = "latest"
fzf = "latest"
glow = "latest"
jq = "latest"
ripgrep = "latest"
scooter = "latest"
yazi = "latest"
zoxide = "latest"

# Editors and terminal multiplexers
helix = "latest"
neovim = "latest"
zellij = "latest"

# Source control helpers
delta = "latest"
tig = { version = "latest", version_prefix = "tig-" }
lazygit = "latest"

# Security and secrets
bitwarden = "latest"

# Productivity and monitoring
wakatime = { version = "latest", bin = "wakatime-cli" }
codex-wakatime = "latest"

{{ if eq .chezmoi.os "windows" -}}
psmux = "latest"
syncthing = "latest"
yt-dlp = "latest"
{{ else -}}
cliproxy = "latest"
tmux = "latest"
{{ end }}
